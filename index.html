      const c = state.schedule[dayId][i][classId];
      if(c && c.batchId===batchId){ delete state.schedule[dayId][i][classId]; removedCount++; }
    });
    if(sub){ sub.used = Math.max(0, sub.used-removedCount); }
  }

  buildSummary();
  buildTable();
  buildSide();

  wrap.querySelector('#back4').addEventListener('click', ()=>{ state.step=3; render(); });
  wrap.querySelector('#toPreview4').addEventListener('click', ()=>{ state.step=5; render(); });

  return wrap;
}

/* =========================================================
   STEP 5 : FULL PREVIEW
   Lihat ulang seluruh jadwal. Pilih satu kombinasi guru + mapel
   + kelas lewat tombol di panel samping — sel yang cocok akan
   menyala terang, sel terisi lainnya jadi semi redup (grayed out).
========================================================= */
function renderStep5(){
  const wrap = document.createElement('div');
  wrap.className = 'wrap wide';

  const layout = document.createElement('div');
  layout.className = 'sched-layout';
  wrap.appendChild(layout);

  const tableWrap = document.createElement('div');
  tableWrap.className = 'sched-table-wrap';
  layout.appendChild(tableWrap);

  const side = document.createElement('div');
  side.className = 'card side-card';
  layout.appendChild(side);

  const backBtn = document.createElement('div');
  backBtn.className = 'actions';
  backBtn.style.margin = '18px 0 0';
  backBtn.innerHTML = `<div><button class="btn ghost" id="back5">← Kembali ke Susun Jadwal</button></div><div class="right"><button class="btn gold" id="next5">Rekap Guru →</button></div>`;
  wrap.appendChild(backBtn);

  function currentSelection(){
    if(!state.previewSelection) return null;
    for(const t of state.teachers){
      const sub = t.subjects.find(s=>s.id===state.previewSelection);
      if(sub) return {teacher:t, sub};
    }
    return null;
  }

  function buildTable(){
    tableWrap.innerHTML = '';
    const table = document.createElement('table');
    table.className = 'sched';
    const thead = document.createElement('thead');
    const headRow = document.createElement('tr');
    headRow.innerHTML = `<th class="corner" style="left:0;position:sticky;">Hari</th><th class="corner" style="left:38px;position:sticky;">Sesi</th><th class="corner" style="left:76px;position:sticky;">Jam</th>`;
    state.classes.forEach(c=>{ headRow.innerHTML += `<th>${c.name}</th>`; });
    thead.appendChild(headRow);
    table.appendChild(thead);

    const sel = currentSelection();
    const tbody = document.createElement('tbody');

    state.days.forEach(day=>{
      const dayTimes = computeDayTimes(day);
      day.rows.forEach((row, rowIndex)=>{
        const tr = document.createElement('tr');
        if(rowIndex===0){
          const td = document.createElement('td');
          td.className='daycell'; td.rowSpan = day.rows.length; td.textContent = day.name;
          tr.appendChild(td);
        }
        let sessionNum = 0;
        for(let i=0;i<=rowIndex;i++){ if(day.rows[i].type==='session') sessionNum++; }

        const tdSes = document.createElement('td');
        tdSes.className='sescell';
        tdSes.textContent = row.type==='session' ? sessionNum : '-';
        tr.appendChild(tdSes);

        const tdTime = document.createElement('td');
        tdTime.className='timecell';
        const t = dayTimes[rowIndex];
        const timeTxt = t ? `${t.start} - ${t.end}` : '—';
        tdTime.innerHTML = `${timeTxt}${row.label ? `<span class="lbl">${row.label}</span>` : ''}`;
        tr.appendChild(tdTime);

        if(row.type==='other'){
          const td = document.createElement('td');
          td.className='blockcell'; td.colSpan = state.classes.length;
          tr.appendChild(td);
        } else {
          state.classes.forEach(cls=>{
            const td = document.createElement('td');
            const cell = (state.schedule[day.id] && state.schedule[day.id][rowIndex]) ? state.schedule[day.id][rowIndex][cls.id] : null;
            const isJoined = isCellJoined(day.id, rowIndex, cls.id);
            let stateClass = '';
            if(sel && cell){
              const isHot = cell.assignId === sel.sub.id;
              stateClass = isHot ? ' pv-hot' : ' pv-dim';
            }
            td.className = 'classcell' + (cell?'':' empty') + (isJoined?' joined':'') + stateClass;
            if(cell){
              const ct = state.teachers.find(tt=>tt.code===cell.teacherCode);
              const fill = document.createElement('div');
              fill.className='fill';
              fill.style.background = ct ? ct.color : '#555';
              fill.innerHTML = `${ct?('#'+ct.code):'?'}<small>${cell.subject}</small>`;
              td.appendChild(fill);
              td.title = `${ct?ct.name:'?'} — ${cell.subject} (${cls.name})`;
            }
            tr.appendChild(td);
          });
        }
        tbody.appendChild(tr);
      });
    });
    table.appendChild(tbody);
    tableWrap.appendChild(table);
  }

  function buildSide(){
    side.innerHTML = '';
    const h = document.createElement('h2'); h.textContent = 'Preview Lengkap'; h.style.fontSize='19px';
    side.appendChild(h);
    const p = document.createElement('p'); p.className='sub';
    p.textContent = 'Pilih salah satu guru + mata pelajaran + kelas di bawah ini untuk menyorotinya pada tabel jadwal. Penempatan lain akan diredupkan agar mudah ditinjau ulang.';
    side.appendChild(p);

    const teachers = sortedTeachers();
    if(teachers.length===0 || teachers.every(t=>t.subjects.length===0)){
      side.innerHTML += `<div class="preview-empty-note">Belum ada penugasan guru/mapel untuk ditinjau.</div>`;
      return;
    }

    const list = document.createElement('div');
    list.className = 'preview-pick-list';
    teachers.forEach(t=>{
      if(t.subjects.length===0) return;
      const group = document.createElement('div');
      group.className = 'preview-pick-group';
      group.innerHTML = `<div class="grp-title"><span class="sw" style="background:${t.color};"></span>#${t.code} ${t.name}</div>`;
      t.subjects.forEach(sub=>{
        const btn = document.createElement('div');
        btn.className = 'preview-pick-btn' + (state.previewSelection===sub.id ? ' sel' : '');
        btn.innerHTML = `<span class="lbl">${sub.subject}</span><span class="cls">${classNameById(sub.classId)}</span>`;
        btn.onclick = ()=>{
          state.previewSelection = (state.previewSelection===sub.id) ? null : sub.id;
          buildSide();
          buildTable();
        };
        group.appendChild(btn);
      });
      list.appendChild(group);
    });
    side.appendChild(list);

    const clearRow = document.createElement('div');
    clearRow.className = 'preview-clear-row';
    clearRow.innerHTML = `<button class="btn ghost sm" id="pvClear">✕ Tampilkan Semua (Reset)</button>`;
    side.appendChild(clearRow);
    clearRow.querySelector('#pvClear').onclick = ()=>{
      state.previewSelection = null;
      buildSide();
      buildTable();
    };

    // legend, mirrors the scheduler stage so colors stay recognizable
    const legend = document.createElement('div');
    legend.className = 'legend';
    teachers.forEach(t=>{
      legend.innerHTML += `<div class="lg"><span class="sw" style="background:${t.color};"></span>#${t.code} ${t.name}</div>`;
    });
    side.appendChild(legend);
  }

  buildTable();
  buildSide();

  wrap.querySelector('#back5').addEventListener('click', ()=>{ state.step=4; render(); });
  wrap.querySelector('#next5').addEventListener('click', ()=>{ state.step=6; render(); });

  return wrap;
}

/* =========================================================
   STEP 6 : REKAP GURU (teacher schedule distribution)
   Pilih satu guru lewat dropdown — tabel jadwal langsung
   menyalakan hanya blok jam milik guru tersebut (sel lain
   tampil kosong, bukan diredupkan/grayed out), lalu di panel
   samping ditampilkan statistik jam per hari (bar + angka)
   beserta daftar jam kosong guru tersebut.
========================================================= */
function renderStep6(){
  const wrap = document.createElement('div');
  wrap.className = 'wrap wide';

  const layout = document.createElement('div');
  layout.className = 'sched-layout';
  wrap.appendChild(layout);

  const tableWrap = document.createElement('div');
  tableWrap.className = 'sched-table-wrap';
  layout.appendChild(tableWrap);

  const side = document.createElement('div');
  side.className = 'card side-card';
  layout.appendChild(side);

  const backBtn = document.createElement('div');
  backBtn.className = 'actions';
  backBtn.style.margin = '18px 0 0';
  backBtn.innerHTML = `<div><button class="btn ghost" id="back6">← Kembali ke Preview Lengkap</button></div><div class="right"></div>`;
  wrap.appendChild(backBtn);

  if(!state.distribusiTeacherCode && state.teachers.length){
    state.distribusiTeacherCode = sortedTeachers()[0].code;
  }

  function computeDistribution(teacherCode){
    const perDay = [];
    let totalAssigned = 0, totalSlots = 0;
    state.days.forEach(day=>{
      const sessionRows = [];
      let sNum = 0;
      day.rows.forEach((row, idx)=>{ if(row.type==='session'){ sNum++; sessionRows.push({rowIndex: idx, sessionNum: sNum}); } });
      const assignedList = [];
      const freeSessions = [];
      sessionRows.forEach(sr=>{
        let hit = null;
        for(const cls of state.classes){
          const cell = state.schedule[day.id] && state.schedule[day.id][sr.rowIndex] ? state.schedule[day.id][sr.rowIndex][cls.id] : null;
          if(cell && cell.teacherCode===teacherCode){ hit = {sessionNum: sr.sessionNum, className: cls.name, subject: cell.subject}; break; }
        }
        if(hit) assignedList.push(hit); else freeSessions.push(sr.sessionNum);
      });
      perDay.push({dayId: day.id, dayName: day.name, totalSessions: sessionRows.length, assignedCount: assignedList.length, assignedList, freeSessions});
      totalAssigned += assignedList.length;
      totalSlots += sessionRows.length;
    });
    return {perDay, totalAssigned, totalSlots};
  }

  function buildTable(){
    tableWrap.innerHTML = '';
    const table = document.createElement('table');
    table.className = 'sched';
    const thead = document.createElement('thead');
    const headRow = document.createElement('tr');
    headRow.innerHTML = `<th class="corner" style="left:0;position:sticky;">Hari</th><th class="corner" style="left:38px;position:sticky;">Sesi</th><th class="corner" style="left:76px;position:sticky;">Jam</th>`;
    state.classes.forEach(c=>{ headRow.innerHTML += `<th>${c.name}</th>`; });
    thead.appendChild(headRow);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    const selCode = state.distribusiTeacherCode;

    state.days.forEach(day=>{
      const dayTimes = computeDayTimes(day);
      day.rows.forEach((row, rowIndex)=>{
        const tr = document.createElement('tr');
        if(rowIndex===0){
          const td = document.createElement('td');
          td.className='daycell'; td.rowSpan = day.rows.length; td.textContent = day.name;
          tr.appendChild(td);
        }
        let sessionNum = 0;
        for(let i=0;i<=rowIndex;i++){ if(day.rows[i].type==='session') sessionNum++; }

        const tdSes = document.createElement('td');
        tdSes.className='sescell';
        tdSes.textContent = row.type==='session' ? sessionNum : '-';
        tr.appendChild(tdSes);

        const tdTime = document.createElement('td');
        tdTime.className='timecell';
        const t = dayTimes[rowIndex];
        const timeTxt = t ? `${t.start} - ${t.end}` : '—';
        tdTime.innerHTML = `${timeTxt}${row.label ? `<span class="lbl">${row.label}</span>` : ''}`;
        tr.appendChild(tdTime);

        if(row.type==='other'){
          const td = document.createElement('td');
          td.className='blockcell'; td.colSpan = state.classes.length;
          tr.appendChild(td);
        } else {
          state.classes.forEach(cls=>{
            const td = document.createElement('td');
            const cell = (state.schedule[day.id] && state.schedule[day.id][rowIndex]) ? state.schedule[day.id][rowIndex][cls.id] : null;
            const isMine = !!(cell && cell.teacherCode === selCode);
            // Only the selected teacher's own blocks light up; every other
            // slot (empty OR taken by another teacher) reads as a plain
            // empty cell, not dimmed/grayed.
            td.className = 'classcell' + (isMine ? ' dist-mine' : ' empty');
            if(isMine){
              const ct = state.teachers.find(tt=>tt.code===cell.teacherCode);
              const fill = document.createElement('div');
              fill.className='fill';
              fill.style.background = ct ? ct.color : '#555';
              fill.innerHTML = `${ct?('#'+ct.code):'?'}<small>${cell.subject}</small>`;
              td.appendChild(fill);
              td.title = `${ct?ct.name:'?'} — ${cell.subject} (${cls.name})`;
            }
            tr.appendChild(td);
          });
        }
        tbody.appendChild(tr);
      });
    });
    table.appendChild(tbody);
    tableWrap.appendChild(table);
  }

  function buildSide(){
    side.innerHTML = '';
    const h = document.createElement('h2'); h.textContent = 'Rekap Guru'; h.style.fontSize='19px';
    side.appendChild(h);
    const p = document.createElement('p'); p.className='sub';
    p.textContent = 'Pilih guru untuk melihat persebaran jam mengajarnya sepanjang minggu. Blok milik guru terpilih akan menyala; slot lain tampil kosong.';
    side.appendChild(p);

    if(state.teachers.length===0){
      side.innerHTML += `<div class="preview-empty-note">Belum ada data guru.</div>`;
      return;
    }

    const tSel = document.createElement('div'); tSel.className='field';
    tSel.innerHTML = `<label>Pilih Guru</label>
      <select id="distTeacherSel">${sortedTeachers().map(t=>`<option value="${t.code}" ${t.code===state.distribusiTeacherCode?'selected':''}>#${t.code} — ${t.name}</option>`).join('')}</select>`;
    side.appendChild(tSel);
    tSel.querySelector('select').onchange = e=>{
      state.distribusiTeacherCode = parseInt(e.target.value);
      buildSide();
      buildTable();
    };

    const teacher = state.teachers.find(t=>t.code===state.distribusiTeacherCode);
    if(!teacher) return;

    const dist = computeDistribution(teacher.code);

    const meter = document.createElement('div');
    meter.className = 'hours-meter';
    meter.innerHTML = `<div style="display:flex;justify-content:space-between;font-size:12.5px;">
        <span>Total Jam Mengajar Terjadwal</span><b style="color:var(--gold-soft);">${dist.totalAssigned} / ${dist.totalSlots} sesi</b>
      </div><div class="bar"><div style="width:${dist.totalSlots ? (100*dist.totalAssigned/dist.totalSlots) : 0}%;background:${teacher.color};"></div></div>`;
    side.appendChild(meter);

    const barList = document.createElement('div');
    barList.className = 'distrib-daybar-list';
    dist.perDay.forEach(d=>{
      const pct = d.totalSessions ? Math.round(100*d.assignedCount/d.totalSessions) : 0;
      const item = document.createElement('div');
      item.className = 'distrib-daybar-item';
      item.innerHTML = `<div class="lbl"><span>${d.dayName}</span><b>${d.assignedCount} / ${d.totalSessions} jam</b></div>
        <div class="bar"><div style="width:${pct}%;background:${teacher.color};"></div></div>`;
      barList.appendChild(item);
    });
    side.appendChild(barList);

    const emptyWrap = document.createElement('div');
    emptyWrap.className = 'distrib-empty-list';
    const emptyTitle = document.createElement('div');
    emptyTitle.className = 'sec-title';
    emptyTitle.textContent = 'Jam Kosong per Hari';
    emptyWrap.appendChild(emptyTitle);
    dist.perDay.forEach(d=>{
      const row = document.createElement('div');
      row.className = 'distrib-empty-day';
      if(d.totalSessions===0){
        row.innerHTML = `<b>${d.dayName}</b> — <span style="color:var(--muted-2);">tidak ada baris sesi.</span>`;
      } else if(d.freeSessions.length===0){
        row.innerHTML = `<b>${d.dayName}</b> — <span style="color:var(--good);">penuh, tidak ada jam kosong.</span>`;
      } else if(d.assignedCount===0){
        row.innerHTML = `<b>${d.dayName}</b> — <span style="color:var(--muted-2);">tidak mengajar sama sekali (semua ${d.totalSessions} sesi kosong).</span>`;
      } else {
        row.innerHTML = `<b>${d.dayName}</b> — sesi kosong:<div class="distrib-empty-tags">${d.freeSessions.map(n=>`<span class="distrib-empty-tag">Sesi ${n}</span>`).join('')}</div>`;
      }
      emptyWrap.appendChild(row);
    });
    side.appendChild(emptyWrap);

    const legend = document.createElement('div');
    legend.className = 'legend';
    legend.style.marginTop = '18px';
    legend.innerHTML = `<div class="lg"><span class="sw" style="background:${teacher.color};"></span>#${teacher.code} ${teacher.name}</div>`;
    side.appendChild(legend);
  }

  buildTable();
  buildSide();

  wrap.querySelector('#back6').addEventListener('click', ()=>{ state.step=5; render(); });

  return wrap;
}

function isCellJoined(dayId, rowIndex, classId){
  const key = dayId+'_'+rowIndex;
  const groups = state.joinGroups[key];
  if(!groups) return false;
  return groups.some(g=>g.includes(classId));
}

function computeConflicts(){
  const conflicts = [];
  state.days.forEach(day=>{
    day.rows.forEach((row, rowIndex)=>{
      if(row.type!=='session') return;
      const teacherMap = {};
      state.classes.forEach(cls=>{
        const cell = state.schedule[day.id] && state.schedule[day.id][rowIndex] ? state.schedule[day.id][rowIndex][cls.id] : null;
        if(cell){
          teacherMap[cell.teacherCode] = teacherMap[cell.teacherCode] || [];
          teacherMap[cell.teacherCode].push(cls.id);
        }
      });
      let sessionNum = 0;
      for(let i=0;i<=rowIndex;i++){ if(day.rows[i].type==='session') sessionNum++; }

      Object.keys(teacherMap).forEach(code=>{
        const classIds = teacherMap[code];
        if(classIds.length<2) return;
        const key = day.id+'_'+rowIndex;
        const groups = state.joinGroups[key] || [];
        const covered = groups.some(g=> classIds.every(cid=>g.includes(cid)) );
        if(!covered){
          conflicts.push({dayId: day.id, dayName: day.name, rowIndex, sessionNum, teacherCode: parseInt(code), classIds});
        }
      });
    });
  });
  return conflicts;
}

/* Detects a teacher entering the SAME class more than once on the SAME day
   in non-contiguous session blocks — e.g. teacher #1 at sessions 3-4 (fine,
   one continuous block) AND again separately at sessions 7-8 (a second,
   disconnected entry into the same class on the same day). */
function computeDoubleEntries(){
  const results = [];
  state.days.forEach(day=>{
    const sessionRows = [];
    let sNum = 0;
    day.rows.forEach((row, idx)=>{
      if(row.type==='session'){ sNum++; sessionRows.push({rowIndex: idx, sessionNum: sNum}); }
    });
    state.classes.forEach(cls=>{
      const seq = sessionRows.map(sr=>{
        const cell = (state.schedule[day.id] && state.schedule[day.id][sr.rowIndex]) ? state.schedule[day.id][sr.rowIndex][cls.id] : null;
        return {rowIndex: sr.rowIndex, sessionNum: sr.sessionNum, teacherCode: cell ? cell.teacherCode : null};
      });
      const runsByTeacher = {};
      let i = 0;
      while(i < seq.length){
        const tc = seq[i].teacherCode;
        if(tc===null || tc===undefined){ i++; continue; }
        let j = i;
        const rowIndexes = [];
        while(j < seq.length && seq[j].teacherCode === tc){ rowIndexes.push(seq[j].rowIndex); j++; }
        const run = {startSession: seq[i].sessionNum, endSession: seq[j-1].sessionNum, rowIndexes};
        (runsByTeacher[tc] = runsByTeacher[tc] || []).push(run);
        i = j;
      }
      Object.keys(runsByTeacher).forEach(tcStr=>{
        const runs = runsByTeacher[tcStr];
        if(runs.length > 1){
          results.push({dayId: day.id, dayName: day.name, classId: cls.id, teacherCode: parseInt(tcStr), runs});
        }
      });
    });
  });
  return results;
}

function removeDoubleEntryRun(dayId, classId, rowIndexes){
  rowIndexes.forEach(ri=>{
    const cell = state.schedule[dayId][ri][classId];
    if(!cell) return;
    const teacher = state.teachers.find(t=>t.code===cell.teacherCode);
    const sub = teacher ? teacher.subjects.find(s=>s.id===cell.assignId) : null;
    delete state.schedule[dayId][ri][classId];
    if(sub) sub.used = Math.max(0, sub.used - 1);
  });
}
